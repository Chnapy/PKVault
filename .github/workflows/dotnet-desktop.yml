name: .NET Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: PKVault.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=${{ matrix.configuration }}

    - name: Build
      run: msbuild $env:Solution_Name /p:Configuration=${{ matrix.configuration }}

    - name: Run Tests (ignore if none)
      run: |
        dotnet test --no-build --configuration ${{ matrix.configuration }} || echo "No tests found — skipping"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PKVault-${{ matrix.configuration }}
        path: PKVault.Desktop/bin/${{ matrix.configuration }}/net8.0-windows
        if-no-files-found: ignore
